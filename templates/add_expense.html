{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">➕ Add Expense</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Amount (PKR)</label>
                        <input type="number" step="0.01" name="amount" class="form-control" placeholder="e.g., 250" required>
                    </div>
                    <div class="mb-3">
                        <label>Category</label>
                        <select name="category" class="form-select" required>
                            <option value="Food">🍔 Food</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Rent">🏠 Rent</option>
                            <option value="Other">📌 Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Description (optional)</label>
                        <input type="text" name="description" class="form-control" placeholder="What did you buy?">
                    </div>
                    <div class="mb-3">
                        <label>Date</label>
                        <input type="date" name="date" class="form-control" value="{{ now.strftime('%Y-%m-%d') if now else '' }}">
                    </div>
                    <button type="submit" class="btn btn-primary">Save Expense</button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
