{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">✏️ Edit Expense</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Amount (PKR)</label>
                        <input type="number" step="0.01" name="amount" class="form-control" value="{{ expense.amount }}" required>
                    </div>
                    <div class="mb-3">
                        <label>Category</label>
                        <select name="category" class="form-select">
                            <option {% if expense.category == 'Food' %}selected{% endif %}>Food</option>
                            <option {% if expense.category == 'Transport' %}selected{% endif %}>Transport</option>
                            <option {% if expense.category == 'Shopping' %}selected{% endif %}>Shopping</option>
                            <option {% if expense.category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
                            <option {% if expense.category == 'Rent' %}selected{% endif %}>Rent</option>
                            <option {% if expense.category == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Description</label>
                        <input type="text" name="description" class="form-control" value="{{ expense.description or '' }}">
                    </div>
                    <div class="mb-3">
                        <label>Date</label>
                        <input type="date" name="date" class="form-control" value="{{ expense.date.strftime('%Y-%m-%d') }}">
                    </div>
                    <button type="submit" class="btn btn-primary">Update</button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
